name: Android Release Build & Sign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build, Sign & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout Source ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ──────────────────────────────────────────────
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ── 3. Setup Flutter (latest stable for Dart 3.8+ compatibility) ──
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify Flutter & Dart versions
        run: |
          flutter --version
          dart --version

      # ── 4. Restore Release Keystore from Secrets ───────────────────
      - name: Decode keystore from KEYSTORE_BASE64
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          echo "Keystore restored at android/app/release.jks"
          # Verify the file exists and has content
          if [ ! -s android/app/release.jks ]; then
            echo "ERROR: Keystore file is empty or missing!"
            exit 1
          fi

      # ── 5. Generate key.properties from Secrets ────────────────────
      - name: Generate key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF
          # Remove leading whitespace added by YAML indentation
          sed -i 's/^[[:space:]]*//' android/key.properties
          echo "key.properties generated successfully"
          echo "--- key.properties contents (passwords redacted) ---"
          sed 's/=.*/=***/' android/key.properties

      # ── 6. Install Dependencies ────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 7. Static Analysis ─────────────────────────────────────────
      # Only errors block the build; warnings and infos are reported but non-fatal.
      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # ── 8. Run Tests ───────────────────────────────────────────────
      # Widget tests use mock DI setup (GetIt) so they work without
      # platform channels (sqflite_sqlcipher, secure storage, etc.)
      - name: Run Flutter tests
        run: flutter test

      # ── 9. Build Release APK ───────────────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release

      # ── 10. Build Release AAB (App Bundle) ─────────────────────────
      - name: Build Release AAB
        run: flutter build appbundle --release

      # ── 11. Verify Signing ─────────────────────────────────────────
      - name: Verify APK signing
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Release APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -h $APK_PATH | cut -f1)"
          # Verify the APK is signed with release key (not debug)
          if unzip -l "$APK_PATH" | grep -q "META-INF/CERT.RSA"; then
            echo "APK is properly signed (CERT.RSA found)"
          else
            echo "WARNING: Could not verify APK signing"
          fi

      - name: Verify AAB signing
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "ERROR: Release AAB not found at $AAB_PATH"
            exit 1
          fi
          echo "AAB size: $(du -h $AAB_PATH | cut -f1)"

      # ── 12. Extract SHA Fingerprints ───────────────────────────────
      - name: Extract SHA1 & SHA256 fingerprints
        run: |
          keytool -list -v \
            -keystore android/app/release.jks \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            2>/dev/null | grep -E "SHA1:|SHA256:" || echo "Could not extract fingerprints"

      # ── 13. Upload Artifacts ───────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      # ── 14. Cleanup Sensitive Files ────────────────────────────────
      - name: Remove sensitive files
        if: always()
        run: |
          rm -f android/app/release.jks
          rm -f android/key.properties
          echo "Sensitive files cleaned up"
